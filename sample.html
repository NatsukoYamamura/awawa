    <style>
        .sample-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.2rem;
            margin-top: 1rem;
        }

        .sample-card {
            padding: 0.8rem;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .sample-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(255, 126, 185, 0.3);
        }

        .sample-card img {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 10px;
            object-fit: cover;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 0.6rem;
        }

        .sample-card .title {
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .sample-card .tag {
            font-size: 0.8rem;
            color: var(--accent);
            margin-top: 0.3rem;
        }
    </style>
</head>
